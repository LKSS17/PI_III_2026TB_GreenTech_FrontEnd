<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenTech - Login</title>
    <link rel="stylesheet" href="/Css/style.css">
</head>
<body>
    <div class="login-container">
        <form class="login-form">
            <h2>GreenTech</h2>
            <p>Conectando inovação e sustentabilidade</p>
            
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
            
            <a href="cadastro/cadastro.html" class="forgot-password">Não tem uma conta? Cadastre-se aqui</a>
            <a href="/recuperar_senha/recuperar.html" class="forgot-password">Esqueceu a senha?</a>
        </form>
    </div>
</body>
</html>
