<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenTech - Recuperar Senha</title>
  <link rel="stylesheet" href="/Css/style.css">
</head>
<body>

  <div class="login-container">
    <form class="login-form">
      <h2>Recuperar Senha</h2>
      <p>Digite seu e-mail cadastrado. Enviaremos um link para você criar uma nova senha.</p>

      <div class="input-group">
        <label for="e-mail-recuperacao">E-mail de Cadastro</label>
        <input type="email" id="email-recuperacao" placeholder="exemplo@greentech.com">
      </div>

      <button type="submit" class="btn-login">Enviar Link de Recuperação</button>

      <div class="links-auxiliadores">
        <a href="/index.html" class="forgot-password">Voltar para o Login</a>
      </div>
    </form>
  </div>  
</body>
</html>
